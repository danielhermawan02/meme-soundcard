<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Meme Soundboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="authContainer" class="auth-container">
        <div class="auth-card">
            <h2 id="authTitle">🔐 Secure Access</h2>
            <p id="authSubtitle">Please sign in to access the soundboard.</p>
            <form id="authForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required autocomplete="current-password">
                </div>
                <div id="setupFields" style="display: none;">
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" autocomplete="new-password">
                    </div>
                </div>
                <button type="submit" id="authSubmitBtn" class="btn btn-primary w-100">Login</button>
                <p id="authError" class="error-text" style="display: none;">Invalid credentials. Try again.</p>
            </form>
        </div>
    </div>

    <div class="app-container" id="mainApp" style="display: none;">
        <header class="app-header">
            <h1>🔊 Meme Soundboard</h1>
            <div class="header-controls">
                <button id="logoutBtn" class="btn btn-secondary">Logout</button>
                <button id="editModeBtn" class="btn btn-secondary">Edit Mode</button>
                <button id="importBtn" class="btn btn-primary">Import Sounds</button>
            </div>
        </header>

        <div class="control-panel">
            <div class="volume-control">
                <label for="globalVolume">🔊 Volume:</label>
                <input type="range" id="globalVolume" min="0" max="100" value="80">
                <span id="volumeValue">80%</span>
            </div>
            <div class="playback-controls">
                <label class="checkbox-label">
                    <input type="checkbox" id="overlapToggle">
                    Allow Overlap
                </label>
            </div>
        </div>

        <div class="edit-toolbar" id="editToolbar">
            <button id="addSoundBtn" class="btn btn-add">+ Add Sound</button>
            <button id="clearAllBtn" class="btn btn-danger">Clear All</button>
        </div>

        <main class="soundboard-grid" id="soundboardGrid">
        </main>

        <footer class="app-footer">
            <p>Tip: Click buttons to play sounds | Toggle Edit Mode to manage</p>
        </footer>
    </div>

    <input type="file" id="fileInput" multiple accept=".mp3,.wav,.ogg" style="display: none;">

    <script src="app.js"></script>
</body>
</html>
